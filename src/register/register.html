<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="registerStyle.css">
    <script src="registerScript.js" defer></script>
</head>
<body>

    <div class="container">
    <h1>Registrazione</h1>

    <form onsubmit="register(event)" id="registerForm">
        <label for="username">Username: </label>
        <input type="text" id="username" name="username" placeholder="Enter username" required><br>

        <label for="email">E-mail: </label>
        <input type="email" id="email" name="email" placeholder="mario.rossi@italia.it" required><br>

        <label for="password">Password: </label>
        <div class="passwordWrapper">
            <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter password"
                    required>
            <button type="button" id="show-password">
                <img src="../assets/mostra.svg" alt="Mostra Password">
            </button>
            </div><br>

        <button class="button" type="submit">Register</button>
        <button class="button" type="reset">Reset</button>
       
    </form>
        <p id="message" class="error-msg"></p>

        <p class="register-link">
            Sei già registrato?
            <a href="../login/login.html">Accedi</a>
        </p>

    </div>
</body>
</html>
